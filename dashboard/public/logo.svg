<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Square -->
  <rect x="20" y="20" width="160" height="160" rx="35" fill="url(#modernGrad)"/>
  
  <!-- K Letter - Custom Design (bukan font) -->
  <g transform="translate(100, 100)">
    <!-- Vertical stroke dengan taper -->
    <path d="M -28 -48 L -28 48 L -16 48 L -16 48 Q -14 48 -14 46 L -14 -46 Q -14 -48 -16 -48 Z" fill="white"/>
    
    <!-- Upper arm - melengkung natural -->
    <path d="M -14 -8 Q -12 -10 -10 -12 L 22 -46 Q 24 -48 26 -48 L 34 -48 Q 36 -48 36 -46 L 36 -42 Q 36 -40 34 -38 L 2 -4 Q 0 -2 -2 -2 L -10 -2 Q -12 -2 -14 -4 Z" fill="white"/>
    
    <!-- Lower arm - melengkung natural -->
    <path d="M -14 8 Q -12 10 -10 12 L 22 46 Q 24 48 26 48 L 34 48 Q 36 48 36 46 L 36 42 Q 36 40 34 38 L 2 4 Q 0 2 -2 2 L -10 2 Q -12 2 -14 4 Z" fill="white"/>
    
    <!-- Payment card icon -->
    <g transform="translate(25, 0)">
      <rect x="0" y="-10" width="28" height="18" rx="3" fill="white" opacity="0.95"/>
      <rect x="2" y="-6" width="10" height="3" rx="1" fill="#4f46e5"/>
      <rect x="2" y="0" width="6" height="4" rx="1" fill="#fbbf24"/>
      
      <!-- Contactless -->
      <path d="M 16 -4 Q 19 -2 16 0" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
      <path d="M 19 -5 Q 23 -2 19 1" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
      <path d="M 22 -6 Q 27 -2 22 2" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
    </g>
  </g>
</svg>
